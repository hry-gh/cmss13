name: Tracy Startup Profiling

on:
  pull_request_target:
    paths-ignore:
      - tools/bootstrap/**
      - tools/build/**

jobs:
  run_tracy_profiling:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    env:
      TRACY_VERSION: "0.13.1"

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v3
        with:
          persist-credentials: false
          path: pr
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ github.token }}

      - name: Checkout base branch
        uses: actions/checkout@v3
        with:
          persist-credentials: false
          path: base
          ref: ${{ github.event.pull_request.base.sha }}
          token: ${{ github.token }}

      - name: Restore BYOND cache
        uses: actions/cache@v3
        with:
          path: ~/BYOND
          key: ${{ runner.os }}-byond-${{ secrets.CACHE_PURGE_KEY }}

      - name: Restore Tracy build cache
        id: tracy-cache
        uses: actions/cache@v3
        with:
          path: |
            ./tracy-capture
            ./tracy-csvexport
          key: ${{ runner.os }}-tracy-${{ env.TRACY_VERSION }}-v2

      - name: Install rust-g
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update || true
          sudo apt install -o APT::Immediate-Configure=false zlib1g-dev:i386 libssl-dev:i386
          cd base && bash tools/ci/install_rust_g.sh

      - name: Build Tracy tools
        if: steps.tracy-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y cmake libtbb-dev libdbus-1-dev
          git clone --depth 1 --branch v${TRACY_VERSION} https://github.com/wolfpld/tracy.git tracy-src
          cmake -S tracy-src/capture  -B tracy-src/capture/build  -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-march=x86-64"
          cmake --build tracy-src/capture/build  --parallel
          cmake -S tracy-src/csvexport -B tracy-src/csvexport/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-march=x86-64"
          cmake --build tracy-src/csvexport/build --parallel
          cp tracy-src/capture/build/tracy-capture   ./tracy-capture
          cp tracy-src/csvexport/build/tracy-csvexport ./tracy-csvexport

      - name: Install byond-tracy
        run: |
          wget -q "https://github.com/spacestation13/byond-tracy/releases/latest/download/libprof.so"

      - name: Compile PR build
        run: |
          cd base && bash tools/ci/install_byond.sh
          source $HOME/BYOND/byond/bin/byondsetup
          cd ../pr && tools/build/build.sh -DTRACY_PROFILE_AND_EXIT -DBYOND_TRACY

      - name: Compile base build
        run: |
          source $HOME/BYOND/byond/bin/byondsetup
          cd base && tools/build/build.sh -DTRACY_PROFILE_AND_EXIT -DBYOND_TRACY

      - name: Prepare run assets
        run: |
          for dir in pr base; do
            cp libprof.so $dir/libprof.so
            cp ~/.byond/bin/librust_g.so $dir/librust_g.so
            cp tracy-capture $dir/tracy-capture
            cp tracy-csvexport $dir/tracy-csvexport
          done

      - name: Run profiling capture
        run: |
          cd pr && git remote remove origin && cd ..
          cd base && git remote remove origin && cd ..
          sudo unshare -n bash -c "\
            ip link set lo up && \
            source $HOME/BYOND/byond/bin/byondsetup && \
            bash base/tools/ci/profile_server.sh base-1.csv base-1.tracy base && \
            bash base/tools/ci/profile_server.sh pr-1.csv   pr-1.tracy   pr  && \
            bash base/tools/ci/profile_server.sh base-2.csv base-2.tracy base && \
            bash base/tools/ci/profile_server.sh pr-2.csv   pr-2.tracy   pr  && \
            bash base/tools/ci/profile_server.sh base-3.csv base-3.tracy base && \
            bash base/tools/ci/profile_server.sh pr-3.csv   pr-3.tracy   pr  && \
            bash base/tools/ci/profile_server.sh base-4.csv base-4.tracy base && \
            bash base/tools/ci/profile_server.sh pr-4.csv   pr-4.tracy   pr  && \
            bash base/tools/ci/profile_server.sh base-5.csv base-5.tracy base && \
            bash base/tools/ci/profile_server.sh pr-5.csv   pr-5.tracy   pr
          "

      - name: Generate PR comment
        run: python3 base/tools/ci/profile_compare.py

      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MARKER="<!-- tracy-profile-comment -->"
          COMMENT_ID=$(gh api \
            repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -n1)

          if [[ -n "$COMMENT_ID" ]]; then
            gh api --method PATCH \
              repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
              -f body="$(cat pr-comment.md)"
          else
            gh api --method POST \
              repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
              -f body="$(cat pr-comment.md)"
          fi

      - name: Upload CSV profiles
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tracy-profile-csv
          path: |
            base-1.csv
            base-2.csv
            base-3.csv
            base-4.csv
            base-5.csv
            pr-1.csv
            pr-2.csv
            pr-3.csv
            pr-4.csv
            pr-5.csv

      - name: Upload Tracy captures
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tracy-profile-tracy
          path: |
            base-1.tracy
            base-2.tracy
            base-3.tracy
            base-4.tracy
            base-5.tracy
            pr-1.tracy
            pr-2.tracy
            pr-3.tracy
            pr-4.tracy
            pr-5.tracy
